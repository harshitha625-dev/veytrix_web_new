<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta
      name="description"
      content="Veytrix.Ai - The ultimate AI-powered video editing and generation studio."
    />
    <meta name="theme-color" content="#0a0a0a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&family=Abel&family=Abril+Fatface&family=Acme&family=Advent+Pro:wght@400;700&family=Alata&family=Rubik:wght@400;700&family=Dancing+Script:wght@700&family=Archivo+Black&family=Oswald:wght@700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://api.dev.runwayml.com" crossorigin />

    <title>Veytrix.Ai | AI Video Editor</title>

    <style>
      :root {
        --bg-color: #000000;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      #initial-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #ffffff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: spin 1s ease-in-out infinite;
      }

      @keyframes spin {
        to {
          transform: translate(-50%, -50%) rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="initial-loader"></div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
