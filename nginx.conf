server {
    listen 80;
    server_name vireonix.ai www.vireonix.ai;
    
    # Define root directory (adjust to your deployment path, usually dist or build)
    root /var/www/vireonix.ai/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Cache Static Assets (JS, CSS, Images, Fonts) for 1 Year
    # Vite hashes these files, so it's safe to cache them forever
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|avif|webp|jpg|jpeg|gif|png|svg|ico)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA Routing: Always serve index.html for 404s to allow React Router to handle it
    location / {
        try_files $uri $uri/ /index.html;
        # Never cache index.html so application updates are immediate
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
